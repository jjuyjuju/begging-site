<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乞讨海报</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #333;
  font-family: 'Microsoft YaHei','PingFang SC',sans-serif;
}
.poster {
  width: 800px; height: 1200px;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
  position: relative;
  overflow: hidden;
  color: #fff;
}
/* 装饰圆 */
.poster::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  border: 2px solid rgba(233,68,96,0.15);
  top: -200px; right: -150px;
}
.poster::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  border: 2px solid rgba(240,192,64,0.1);
  bottom: 100px; left: -100px;
}
/* 内容 */
.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 50px;
  height: 100%;
}
/* 标签 */
.tag {
  background: rgba(233,68,96,0.2);
  border: 1px solid rgba(233,68,96,0.4);
  color: #e94560;
  padding: 8px 24px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 4px;
  margin-bottom: 30px;
}
/* 主标题 */
.emoji-big {
  font-size: 140px;
  margin: 20px 0 10px;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}
.title {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, #f0c040, #e94560);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 20px;
  color: #999;
  margin-bottom: 30px;
}
/* 目标卡片 */
.goal-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 28px 50px;
  text-align: center;
  margin-bottom: 30px;
  width: 100%;
  max-width: 500px;
}
.goal-amount {
  font-size: 64px;
  font-weight: 900;
  color: #f0c040;
}
.goal-label {
  font-size: 16px;
  color: #999;
  margin-top: 4px;
}
/* 支付方式 */
.pay-section {
  display: flex;
  gap: 30px;
  margin-bottom: 25px;
}
.pay-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px 24px;
  text-align: center;
  width: 200px;
}
.pay-icon {
  font-size: 36px;
  margin-bottom: 6px;
}
.pay-name {
  font-size: 15px;
  font-weight: 700;
  color: #ccc;
}
.pay-sub {
  font-size: 11px;
  color: #666;
  margin-top: 2px;
}
/* 网址 */
.url-box {
  background: rgba(0,0,0,0.3);
  border-radius: 16px;
  padding: 16px 36px;
  margin: 20px 0;
}
.url-text {
  font-size: 22px;
  font-weight: 700;
  color: #4cff8f;
  letter-spacing: 1px;
  font-family: 'Courier New', monospace;
}
.url-label {
  font-size: 12px;
  color: #666;
  text-align: center;
  margin-top: 6px;
}
/* 底部标语 */
.slogan {
  font-size: 18px;
  color: #999;
  margin-top: auto;
  text-align: center;
  line-height: 1.8;
}
.slogan strong {
  color: #f0c040;
}
/* 二维码占位 */
.qr-note {
  background: rgba(240,192,64,0.1);
  border: 1px dashed rgba(240,192,64,0.3);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 13px;
  color: #f0c040;
  text-align: center;
}
</style>
</head>
<body>
<div class="poster">
  <div class="content">
    <div class="tag">🔥 互联网要饭</div>
    <div class="emoji-big">🥺</div>
    <div class="title">在线乞讨</div>
    <div class="subtitle">讨到100元就收手！</div>

    <div class="goal-card">
      <div class="goal-amount">¥100</div>
      <div class="goal-label">🎯 目标金额</div>
    </div>

    <div class="pay-section">
      <div class="pay-box">
        <div class="pay-icon">💚</div>
        <div class="pay-name">微信支付</div>
        <div class="pay-sub">扫码施舍</div>
      </div>
      <div class="pay-box">
        <div class="pay-icon">💙</div>
        <div class="pay-name">支付宝</div>
        <div class="pay-sub">扫码施舍</div>
      </div>
    </div>

    <div class="url-box">
      <div class="url-text">jjuyjuju.github.io/begging-site</div>
      <div class="url-label">👆 打开网站即可施舍</div>
    </div>

    <div class="qr-note">
      📸 手机扫码或复制链接 → 打开网站 → 扫码施舍 → 好人一生平安！
    </div>

    <div class="slogan">
      行行好吧老板们<br>
      给口饭吃 <strong>🙏</strong><br>
      <strong>好人一生平安</strong>
    </div>
  </div>
</div>
</body>
</html>
